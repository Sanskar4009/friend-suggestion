<!DOCTYPE html>
<html lang="en" data-lenis-prevent>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Friend Network</title>
    
    <!-- Clean fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.155.0/three.min.js"></script>
    <!-- Canvas Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <!-- Lenis Smooth Scroll -->
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.19/bundled/lenis.min.js"></script>
    <!-- Enhanced Animations -->
    <script src="animation.js"></script>
</head>
<body data-lenis-prevent>
    <!-- Three.js canvas -->
    <canvas id="threejs-bg" style="position: fixed; top: 0; left: 0; z-index: -1;"></canvas>
    
    <!-- Enhanced Background Elements -->
    <div class="bg-elements">
        <!-- Advanced floating particles -->
        <div class="advanced-particles">
            <div class="floating-particle"></div>
            <div class="floating-particle"></div>
            <div class="floating-particle"></div>
            <div class="floating-particle"></div>
            <div class="floating-particle"></div>
        </div>
        
        <!-- Dynamic overlay that follows mouse -->
        <div class="dynamic-overlay"></div>
        
        <!-- Geometric shapes -->
        <div class="geometric-shapes">
            <div class="shape"></div>
            <div class="shape"></div>
            <div class="shape"></div>
            <div class="shape"></div>
        </div>
        
        <!-- Light rays -->
        <div class="light-rays"></div>
        
        <!-- Neural network pattern -->
        <div class="neural-network"></div>
        
        <!-- Scan lines -->
        <div class="scan-lines"></div>
        
        <!-- Particle system -->
        <div class="particle-system">
            <div class="system-particle"></div>
            <div class="system-particle"></div>
            <div class="system-particle"></div>
            <div class="system-particle"></div>
            <div class="system-particle"></div>
        </div>
        
        <!-- Tech symbols -->
        <div class="tech-symbols">
            <div class="tech-symbol">{ }</div>
            <div class="tech-symbol">[ ]</div>
            <div class="tech-symbol">&lt;/&gt;</div>
            <div class="tech-symbol">( )</div>
            <div class="tech-symbol">===</div>
            <div class="tech-symbol">-&gt;</div>
            <div class="tech-symbol">=&gt;</div>
            <div class="tech-symbol">++</div>
            <div class="tech-symbol">$$</div>
        </div>
        
        <!-- Code rain effect -->
        <div class="code-rain"></div>
    </div>
    
    <!-- Loading Screen -->
    <div id="loadingScreen" class="loading-screen">
        <div class="loader"></div>
        <div class="loading-text">Initializing...</div>
    </div>
    
    <!-- Main App -->
    <div class="container" id="mainApp" style="display: none;">
        <!-- Header -->
        <header class="header">
            <h1 class="neon-text">Friend Network</h1>
            <p class="subtitle">Discover meaningful connections</p>
        </header>
        
        <!-- User Selection -->
        <section class="card" data-animate>
            <div class="card-particles">
                <div class="particle"></div>
                <div class="particle"></div>
                <div class="particle"></div>
                <div class="particle"></div>
            </div>
            <div class="card-header">
                <div class="icon">👤</div>
                <h3>Select User</h3>
            </div>
            <div class="form-group">
                <select id="userDropdown" class="input"></select>
                <button id="suggestBtn" class="btn primary">
                    Suggest Friends
                    <span class="btn-icon">✨</span>
                </button>
            </div>
        </section>
        
        <!-- Add User -->
        <section class="card" data-animate>
            <div class="card-particles">
                <div class="particle"></div>
                <div class="particle"></div>
                <div class="particle"></div>
                <div class="particle"></div>
            </div>            <div class="card-header">
                <div class="icon">✨</div>
                <h3>Add User</h3>
            </div>
            <div class="form-group">
                <input type="text" id="newUserInput" placeholder="Enter username" class="input">
                <button id="addUserBtn" class="btn secondary">
                    Add User
                    <span class="btn-icon">➕</span>
                </button>
            </div>
        </section>

        <!-- Add Friendship -->
        <section class="card" data-animate>
            <div class="card-particles">
                <div class="particle"></div>
                <div class="particle"></div>
                <div class="particle"></div>
                <div class="particle"></div>
            </div>
            <div class="card-header">
                <div class="icon">🔗</div>
                <h3>Create Connection</h3>
            </div>
            <div class="form-group">
                <div class="dual-input">
                    <input type="text" id="friend1Input" placeholder="First user" class="input">
                    <div class="connector"></div>
                    <input type="text" id="friend2Input" placeholder="Second user" class="input">
                </div>
                <button id="addFriendshipBtn" class="btn secondary">
                    Connect Users
                    <span class="btn-icon">🔗</span>
                </button>
            </div>
        </section>
        
        <!-- Results -->
        <section class="card result-card" data-animate>
            <div class="card-particles">
                <div class="particle"></div>
                <div class="particle"></div>
                <div class="particle"></div>
                <div class="particle"></div>
            </div>
            <div class="card-header">
                <div class="icon">🧠</div>
                <h3>Results</h3>
            </div>
            <div class="result-container">
                <pre id="resultArea" class="result-area"></pre>
            </div>
        </section>
    </div>
    
    <script src="app-simple.js"></script>
</body>
</html>
